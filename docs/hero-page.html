<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Read It Later - Chrome Extension</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 1180px;
      height: 720px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }

    .container {
      width: 1120px;
      height: 660px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .left {
      padding-left: 40px;
    }

    .badge {
      display: inline-block;
      padding: 6px 14px;
      background: #fff;
      border: 1px solid #d4d7da;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #6e7781;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 56px;
      font-weight: 800;
      line-height: 1.15;
      color: #1a1d20;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 18px;
      line-height: 1.6;
      color: #5a6169;
      margin-bottom: 32px;
      max-width: 480px;
    }

    .features {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .feature-tag {
      padding: 10px 18px;
      background: #2d3339;
      color: #fff;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .feature-tag:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(45, 51, 57, 0.25);
    }

    .feature-tag.primary {
      background: #4f9b85;
    }

    .feature-tag.secondary {
      background: #c98942;
    }

    .right {
      position: relative;
      height: 660px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .browser-frame {
      width: 520px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 24px 60px rgba(28, 34, 40, 0.22);
      overflow: hidden;
      border: 1px solid #d4d7da;
    }

    .browser-header {
      height: 48px;
      background: #f5f6f7;
      border-bottom: 1px solid #dfe2e5;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
    }

    .traffic-lights {
      display: flex;
      gap: 8px;
    }

    .traffic-lights span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: block;
    }

    .traffic-lights span:nth-child(1) { background: #e86d5b; }
    .traffic-lights span:nth-child(2) { background: #e4b953; }
    .traffic-lights span:nth-child(3) { background: #65b37a; }

    .address-bar {
      flex: 1;
      height: 28px;
      background: #fff;
      border: 1px solid #d4d7da;
      border-radius: 6px;
      font-size: 12px;
      color: #6e7781;
      padding: 0 12px;
      display: flex;
      align-items: center;
    }

    .extension-icon {
      width: 24px;
      height: 24px;
      background: #4f9b85;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
    }

    .popup-container {
      width: 100%;
      height: 615px;
      background: #f7f4ec;
      position: relative;
    }

    .popup-image {
      width: 380px;
      height: 615px;
      margin: 0 auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <div class="badge">CHROME POPUP</div>
      <h1>一键收藏，<br>稍后阅读</h1>
      <p class="subtitle">
        无需账号，本地存储。按 Alt+1 或点击图标，当前网页立即收藏；再按一次，取消收藏。搜索、打开、删除，一切都在弹窗里完成。
      </p>
      <div class="features">
        <div class="feature-tag primary">Alt+1 快捷键</div>
        <div class="feature-tag">本地存储</div>
        <div class="feature-tag secondary">即时搜索</div>
        <div class="feature-tag">黄金比例</div>
      </div>
    </div>

    <div class="right">
      <div class="browser-frame">
        <div class="browser-header">
          <div class="traffic-lights">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="address-bar">chrome-extension://read-it-later/popup.html</div>
          <div class="extension-icon">📑</div>
        </div>
        <div class="popup-container">
          <img src="screenshots/popup-with-entries.png" alt="Read It Later" class="popup-image">
        </div>
      </div>
    </div>
  </div>
</body>
</html>
